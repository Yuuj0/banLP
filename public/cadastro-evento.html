<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Evento</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; color: #1f2937; background: #f4f7fb; }
    header { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 20px 8%; background: #fff; border-bottom: 1px solid #dde3ee; }
    h1 { margin: 0; font-size: 26px; }
    a { color: #2563eb; text-decoration: none; font-weight: 700; }
    main { width: min(680px, 92%); margin: 30px auto; background: #fff; border: 1px solid #dde3ee; border-radius: 8px; padding: 24px; }
    label { display: block; margin: 14px 0 6px; font-weight: 700; }
    input, textarea { width: 100%; padding: 11px; border: 1px solid #b8c2d4; border-radius: 6px; font: inherit; }
    textarea { min-height: 110px; resize: vertical; }
    .linha { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    button { margin-top: 18px; border: 0; border-radius: 6px; padding: 12px 16px; color: #fff; background: #2563eb; font-size: 16px; font-weight: 700; cursor: pointer; }
    .mensagem { min-height: 22px; margin-top: 14px; font-weight: 700; }
    .sucesso { color: #15803d; }
    .erro { color: #b91c1c; }
    @media (max-width: 560px) { .linha { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>Cadastrar evento</h1>
    <a href="/">Ver pagina inicial</a>
  </header>

  <main>
    <form id="formEvento">
      <label for="nome">Nome do evento</label>
      <input id="nome" name="nome" type="text" required>

      <label for="categoria">Categoria</label>
      <input id="categoria" name="categoria" type="text" required>

      <label for="descricao">Descricao</label>
      <textarea id="descricao" name="descricao" required></textarea>

      <div class="linha">
        <div>
          <label for="data_evento">Data</label>
          <input id="data_evento" name="data_evento" type="date" required>
        </div>
        <div>
          <label for="vagas">Vagas</label>
          <input id="vagas" name="vagas" type="number" min="1" required>
        </div>
      </div>

      <label for="local">Local</label>
      <input id="local" name="local" type="text" required>

      <button type="submit">Salvar evento</button>
      <p id="mensagem" class="mensagem"></p>
    </form>
  </main>

  <script>
    const organizadorLogado = localStorage.getItem('organizadorLogado');

    if (!organizadorLogado) {
      window.location.href = '/login.html';
    }

    const form = document.getElementById('formEvento');
    const mensagem = document.getElementById('mensagem');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      mensagem.textContent = 'Salvando evento...';
      mensagem.className = 'mensagem';

      const dados = {
        nome: form.nome.value.trim(),
        categoria: form.categoria.value.trim(),
        descricao: form.descricao.value.trim(),
        data_evento: form.data_evento.value,
        local: form.local.value.trim(),
        vagas: Number(form.vagas.value)
      };

      try {
        const resposta = await fetch('/evento', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(dados)
        });
        const retorno = await resposta.json();

        if (!resposta.ok) {
          throw new Error(retorno.mensagem || 'Nao foi possivel cadastrar o evento.');
        }

        mensagem.textContent = 'Evento cadastrado com sucesso.';
        mensagem.className = 'mensagem sucesso';
        form.reset();
      } catch (error) {
        mensagem.textContent = error.message;
        mensagem.className = 'mensagem erro';
      }
    });
  </script>
</body>
</html>
